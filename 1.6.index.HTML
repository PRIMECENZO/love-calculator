<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Love Probability Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff5f6d,#ffc371,#6a11cb,#2575fc);
background-size:400% 400%;
animation:bg 10s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:420px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
text-align:center;
color:white;
box-shadow:0 0 30px rgba(0,0,0,.35);
}

h1{
margin-bottom:15px;
font-size:30px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#ff2d55;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff0044;
}

#result{
margin-top:25px;
font-size:22px;
font-weight:bold;
}

.music{
margin-top:25px;
}

.music audio{
width:100%;
}
</style>
</head>

<body>

<div class="card">

<h1> Love Probability </h1>

<input type="text" id="name1" placeholder="YOUR INSTAGRAM ID">

<input type="text" id="name2" placeholder="crush INSTAGRAM ID">

<button onclick="calculate()">Calculate </button>

<div id="result"></div>

<div class="music">
<p> Coke Studio Bharat</p>

<audio controls>
<source src="cokestudio.mp3" type="audio/mpeg">
Your browser does not support audio.
</audio>

</div>

</div>

<script>

function calculate(){

let first=document.getElementById("name1").value.trim();

let second=document.getElementById("name2").value.trim();

if(first==""||second==""){
document.getElementById("result").innerHTML="Enter both names ";
return;
}

let probability;

if(second==="itzz_edwinnn"){
probability=101;
}
else{

let total=0;

let text=(first+second).toLowerCase();

for(let i=0;i<text.length;i++){
total+=text.charCodeAt(i);
}

probability=(total%100)+1;

}

document.getElementById("result").innerHTML=
`?? ${first} + ${second}<br><br>Love Probability: <span style="color:#ffe600">${probability}%</span>`;

}

</script>

</body>
<!-- Disclaimer Popup -->
<div id="disclaimer">
    <div class="popup">
                  <h3> Disclaimer</h3
         <h4>          PROPOSE THEM IN 5 MINUTES IF YOU GOT 101% PROBABILITY<h4>
          <h4>                       101% IS HARD TO GET<h4>
          <h3>         USE THE PROPER ID TO GET THE PERFECT REASULT <h3>
       
    </div>
</div>
</html>
